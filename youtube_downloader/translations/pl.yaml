  debug:
    name: "Tryb debug"
    description: "Włącza rozszerzone logi aplikacji."
  preferred_format:
    name: "Preferowany format"
    description: "Domyślny wariant pobierania prezentowany przez aplikację."
network:
  8099/tcp: "Opcjonalny zewnętrzny dostęp do interfejsu webowego"
