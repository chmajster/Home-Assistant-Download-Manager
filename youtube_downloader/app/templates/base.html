<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="ingress-path" content="{{ ingress_path }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Media Downloader{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/mobile.css') }}" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/desktop.css') }}" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand navbar-dark bg-dark sticky-top shadow-sm">
      <div class="container-fluid app-container">
        <a class="navbar-brand fw-semibold" href="{{ ingress_url('web.index') }}">Media Downloader</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ ingress_url('web.index') }}">Start</a>
          <a class="nav-link" href="{{ ingress_url('web.jobs') }}">Zadania</a>
        </div>
      </div>
    </nav>
    <main class="container-fluid app-container py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zamknij"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ ingress_url('static', filename='js/app.js') }}"></script>
  </body>
</html>
