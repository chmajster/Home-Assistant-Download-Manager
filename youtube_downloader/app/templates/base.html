<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="ingress-path" content="{{ ingress_path }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script id="allowed-hosts" type="application/json">{{ allowed_hosts|tojson }}</script>
    <script id="active-job-statuses" type="application/json">{{ active_job_statuses|tojson }}</script>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("media-web-downloader-theme");
          const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-bs-theme", storedTheme || preferredTheme);
        } catch {
          document.documentElement.setAttribute("data-bs-theme", "light");
        }
      })();
    </script>
    <title>{% block title %}Media Web Downloader{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/mobile.css') }}" rel="stylesheet">
    <link href="{{ ingress_url('static', filename='css/desktop.css') }}" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand sticky-top app-navbar">
      <div class="container-fluid app-container">
        <a class="navbar-brand app-brand" href="{{ ingress_url('web.index') }}">
          <span class="brand-mark" aria-hidden="true">MWD</span>
          <span>
            <strong>Media Web Downloader</strong>
            <small>Home Assistant</small>
          </span>
        </a>
        <div class="navbar-nav app-nav ms-auto">
          <a class="nav-link" href="{{ ingress_url('web.index') }}">Start</a>
          <a class="nav-link" href="{{ ingress_url('web.history') }}">Historia</a>
          <a class="nav-link" href="{{ ingress_url('web.jobs') }}">
            Zadania <span id="active-jobs-badge" class="badge rounded-pill text-bg-light ms-1" aria-label="Aktywne zadania">0</span>
          </a>
          <button class="theme-toggle" id="theme-toggle" type="button" data-theme-toggle aria-label="Zmień motyw" aria-pressed="false" title="Zmień motyw">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </div>
    </nav>
    <main class="container-fluid app-container py-4">
      <div id="jobs-refresh-error" class="alert alert-warning app-alert d-none" role="status">
        Brak połączenia / nie można odświeżyć zadań
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show app-alert" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zamknij"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ ingress_url('static', filename='js/app.js') }}"></script>
  </body>
</html>
