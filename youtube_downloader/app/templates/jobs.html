{% extends "base.html" %}
{% block title %}Zadania | Media Downloader{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-1">Zadania</h1>
      <p class="text-body-secondary mb-0">Status odświeża się automatycznie.</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ ingress_url('web.index') }}">Start</a>
  </div>
  <section class="card border-0 shadow-sm">
    <div class="card-body">
      <div id="jobs-empty" class="text-body-secondary{% if jobs %} d-none{% endif %}">Brak zadań w tej sesji dodatku.</div>
      <div class="desktop-only table-responsive">
        <table class="table align-middle mb-0">
          <thead><tr><th>Tytuł</th><th>Typ</th><th>Status</th><th>Postęp</th><th>Prędkość</th><th>ETA</th><th>Wynik</th><th></th></tr></thead>
          <tbody id="jobs-table-body"></tbody>
        </table>
      </div>
      <div class="mobile-only" id="jobs-card-list"></div>
    </div>
  </section>
{% endblock %}
